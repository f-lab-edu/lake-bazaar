---
# users-ssh: 공용 사용자/그룹/SSH 키/권한 표준화

- name: 공용 그룹 생성
  group:
    name: lake
    state: present

- name: 공용 사용자 생성
  user:
    name: lake
    comment: Lake Bazaar Service Account
    groups: "lake,sudo"
    append: yes
    shell: /bin/bash
    create_home: yes

- name: sudoers NOPASSWD 구성
  copy:
    dest: /etc/sudoers.d/99-lake
    content: "lake ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: '0440'
  notify: validate sudoers

- name: lake 계정의 SSH 디렉토리 생성
  file:
    path: /home/lake/.ssh
    state: directory
    owner: lake
    group: lake
    mode: '0700'

- name: lake 계정 authorized_keys 배포
  copy:
    src: authorized_keys
    dest: /home/lake/.ssh/authorized_keys
    owner: lake
    group: lake
    mode: '0600'
